name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
      NEXT_PUBLIC_BUNNY_LIBRARY_ID: ${{ secrets.BUNNY_LIBRARY_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma validate
      - run: npx tsc --noEmit
      - run: npm run build

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 120s
          envs: STRIPE_SECRET_KEY,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY,STRIPE_WEBHOOK_SECRET,BUNNY_API_KEY,BUNNY_LIBRARY_ID,BUNNY_LIBRARY_API_KEY,BUNNY_CDN_HOSTNAME
          script: |
            cd /opt/gsa
            git pull origin main
            cd docker
            cat > .env << EOF
            STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=$NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
            STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET
            BUNNY_API_KEY=$BUNNY_API_KEY
            BUNNY_LIBRARY_ID=$BUNNY_LIBRARY_ID
            BUNNY_LIBRARY_API_KEY=$BUNNY_LIBRARY_API_KEY
            BUNNY_CDN_HOSTNAME=$BUNNY_CDN_HOSTNAME
            EOF
            docker compose up -d --build app
            docker compose run --rm migrate
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_LIBRARY_ID: ${{ secrets.BUNNY_LIBRARY_ID }}
          BUNNY_LIBRARY_API_KEY: ${{ secrets.BUNNY_LIBRARY_API_KEY }}
          BUNNY_CDN_HOSTNAME: ${{ secrets.BUNNY_CDN_HOSTNAME }}
