version: '3.8'

services:
  app-dev:
    build:
      context: ../
      dockerfile: docker/Dockerfile.dev
    container_name: gsa-app-dev
    ports:
      - "3000:3000"
    volumes:
      - ../:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://gsa_user:gsa_password@db:5432/gsa_db?schema=public
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=mi_secreto_local_12345
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run dev"

  app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: gsa-app
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - gsa_uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://gsa_user:gsa_password@db:5432/gsa_db?schema=public
      - NEXTAUTH_URL=https://growthsalessacademy.com
      - NEXTAUTH_SECRET=generate_a_strong_secret_here
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NEXT_PUBLIC_APP_URL=https://growthsalessacademy.com
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: gsa-db
    restart: always
    environment:
      - POSTGRES_USER=gsa_user
      - POSTGRES_PASSWORD=gsa_password
      - POSTGRES_DB=gsa_db
    ports:
      - "5433:5432"
    volumes:
      - gsa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsa_user -d gsa_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ../
      dockerfile: docker/Dockerfile
      target: builder
    environment:
      - DATABASE_URL=postgresql://gsa_user:gsa_password@db:5432/gsa_db?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: npx prisma migrate deploy

  caddy:
    image: caddy:latest
    container_name: gsa-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - gsa_caddy_data:/data
      - gsa_caddy_config:/config
      - gsa_uploads:/srv/uploads:ro
    depends_on:
      - app

volumes:
  gsa_pgdata:
  gsa_uploads:
  gsa_caddy_data:
  gsa_caddy_config:
